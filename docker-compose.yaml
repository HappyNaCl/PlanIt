services:
  postgres:
    container_name: planit-db
    image: postgres:latest
    environment:
      POSTGRES_USER: planit
      POSTGRES_PASSWORD: planit
      POSTGRES_DB: planit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
  
  redis:
    container_name: planit-redis
    image: redis:latest
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  rustfs:
    image: rustfs/rustfs:latest
    container_name: planit-rustfs
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs
    environment:
      - RUSTFS_ACCESS_KEY=planit
      - RUSTFS_SECRET_KEY=planit
  
  rabbitmq:
    image: rabbitmq:3
    container_name: planit-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: planit
      RABBITMQ_DEFAULT_PASS: planit
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  rustfs_data:
  rustfs_logs:
